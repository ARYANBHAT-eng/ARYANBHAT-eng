      <rect x="0" y="0" width="950" height="120" rx="18" fill="#0a1018" stroke="#b026ff" stroke-opacity="0.25"/>
      <rect x="0" y="0" width="950" height="3" rx="1" fill="url(#acc-purple)"/>
      <text class="mono" x="22" y="26" fill="#b026ff" font-size="13" font-weight="900" letter-spacing="1.5">JAN 2025 - APR 2025</text>
      <text class="sans" x="22" y="54" fill="#f8fafc" font-size="20" font-weight="900">Project Intern</text>
      <text class="sans" x="22" y="78" fill="#b026ff" font-size="15" font-weight="700">HT Digital Streams</text>
      <text class="sans" x="22" y="100" fill="#94a3b8" font-size="13" font-weight="600">Analytics dashboards · KPI systems · data pipelines · reporting infrastructure</text>
