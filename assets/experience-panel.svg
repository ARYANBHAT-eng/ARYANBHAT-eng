        <rect x="0" y="0" width="950" height="3" rx="1" fill="url(#acc-green)"/>
        <text class="mono" x="22" y="26" fill="#39ff14" font-size="13" font-weight="900" letter-spacing="1.5">MAY 2021 - JUN 2021</text>
