<svg width="1200" height="410" viewBox="0 0 1200 410" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Current Focus</title>
  <desc id="desc">Current focus areas with terminal-style progress bars.</desc>
  <defs>
    <linearGradient id="edge" x1="38" y1="34" x2="1162" y2="376" gradientUnits="userSpaceOnUse">
      <stop stop-color="#39ff14"/><stop offset="0.52" stop-color="#00d4ff"/><stop offset="1" stop-color="#b026ff"/>
    </linearGradient>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }
      .mono { font-family: "JetBrains Mono", "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; }
