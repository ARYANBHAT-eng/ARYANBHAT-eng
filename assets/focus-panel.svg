      <rect class="bar-bg" x="410" y="-13" width="520" height="14" rx="7"/>
      <rect x="410" y="-13" width="438" height="14" rx="7" fill="#39ff14"/>
    </g>
    <g transform="translate(0 82)">
      <text x="0" y="0" fill="#cbd5e1">Workflow automation platforms</text>
      <rect class="bar-bg" x="410" y="-13" width="520" height="14" rx="7"/>
      <rect x="410" y="-13" width="344" height="14" rx="7" fill="#00d4ff"/>
    </g>
    <g transform="translate(0 122)">
