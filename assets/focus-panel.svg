    </style>
  </defs>
  <rect width="1200" height="410" fill="transparent"/>
  <rect x="38" y="34" width="1124" height="342" rx="28" fill="#070b10"/>
  <rect x="39" y="35" width="1122" height="340" rx="27" stroke="url(#edge)" stroke-width="2"/>
  <g transform="translate(76 72)">
