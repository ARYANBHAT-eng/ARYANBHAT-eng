      <stop stop-color="#39ff14" stop-opacity="0.7"/><stop offset="1" stop-color="#39ff14" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="chipEdge-cyan" x1="0" y1="0" x2="120" y2="34" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00d4ff" stop-opacity="0.7"/><stop offset="1" stop-color="#00d4ff" stop-opacity="0.3"/>
    </linearGradient>
