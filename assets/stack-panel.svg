<svg width="1200" height="1000" viewBox="0 0 1200 1000" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Tech Stack — Aryan Bhat</title>
  <desc id="desc">Engineering stack organized by category, with AI/LLM engineering as the primary focus.</desc>
  <defs>
    <linearGradient id="edge" x1="38" y1="34" x2="1162" y2="966" gradientUnits="userSpaceOnUse">
      <stop stop-color="#39ff14"/><stop offset="0.5" stop-color="#00d4ff"/><stop offset="1" stop-color="#b026ff"/>
    </linearGradient>
    <linearGradient id="accent-green" x1="0" y1="0" x2="500" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#39ff14" stop-opacity="0"/>
      <stop offset="25%" stop-color="#39ff14" stop-opacity="0.8"/>
      <stop offset="75%" stop-color="#39ff14" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#39ff14" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accent-cyan" x1="0" y1="0" x2="500" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0"/>
      <stop offset="25%" stop-color="#00d4ff" stop-opacity="0.8"/>
      <stop offset="75%" stop-color="#00d4ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accent-purple" x1="0" y1="0" x2="500" y2="0" gradientUnits="userSpaceOnUse">
