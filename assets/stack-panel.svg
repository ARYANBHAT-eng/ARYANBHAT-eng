<svg width="1200" height="860" viewBox="0 0 1200 860" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Tech Stack</title>
  <desc id="desc">Technology stack grouped into clearly defined engineering categories.</desc>
  <defs>
    <linearGradient id="edge" x1="38" y1="34" x2="1162" y2="826" gradientUnits="userSpaceOnUse">
      <stop stop-color="#39ff14"/><stop offset="0.5" stop-color="#00d4ff"/><stop offset="1" stop-color="#b026ff"/>
    </linearGradient>
    <linearGradient id="chipEdge" x1="0" y1="0" x2="170" y2="40" gradientUnits="userSpaceOnUse">
      <stop stop-color="#39ff14" stop-opacity="0.8"/><stop offset="1" stop-color="#00d4ff" stop-opacity="0.55"/>
    </linearGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" stroke="#94f985" stroke-opacity="0.045"/>
    </pattern>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }
      .mono { font-family: "JetBrains Mono", "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; }
      .kicker { fill:#39ff14; font-size:12px; font-weight:900; letter-spacing:2px; }
      .group { fill:#f8fafc; font-size:22px; font-weight:900; }
      .hint { fill:#94a3b8; font-size:15px; font-weight:700; }
      .chip { fill:#e5e7eb; font-size:16px; font-weight:850; }
    </style>
  </defs>

  <rect width="1200" height="860" fill="transparent"/>
  <rect x="38" y="34" width="1124" height="792" rx="28" fill="#070b10"/>
  <rect x="39" y="35" width="1122" height="790" rx="27" stroke="url(#edge)" stroke-width="2"/>
  <rect x="38" y="34" width="1124" height="792" rx="28" fill="url(#grid)"/>

  <g transform="translate(76 72)">
    <rect x="0" y="0" width="154" height="32" rx="16" fill="#0d141d" stroke="#263449"/>
    <text class="mono kicker" x="20" y="21">TECH STACK</text>
    <text class="sans" x="0" y="78" fill="#f8fafc" font-size="36" font-weight="900">Defined engineering stack.</text>
    <text class="sans" x="0" y="114" fill="#94a3b8" font-size="19" font-weight="650">Organized by the way I build interfaces, APIs, automation, data, and deployments.</text>
  </g>

  <g transform="translate(76 214)">
    <g>
      <rect x="0" y="0" width="500" height="156" rx="22" fill="#0a1018" stroke="#213047"/>
      <text class="mono kicker" x="26" y="34">01 / LANGUAGES</text>
      <text class="sans group" x="26" y="70">Core implementation layer</text>
      <text class="sans hint" x="26" y="98">General-purpose scripting, web foundations, and query work.</text>
      <rect x="26" y="114" width="88" height="34" rx="10" fill="#111827" stroke="url(#chipEdge)"/>
      <text class="sans chip" x="44" y="137">Python</text>
      <rect x="126" y="114" width="116" height="34" rx="10" fill="#111827" stroke="url(#chipEdge)"/>
      <text class="sans chip" x="144" y="137">JavaScript</text>
      <rect x="254" y="114" width="58" height="34" rx="10" fill="#111827" stroke="url(#chipEdge)"/>
      <text class="sans chip" x="274" y="137">SQL</text>
      <rect x="324" y="114" width="64" height="34" rx="10" fill="#111827" stroke="url(#chipEdge)"/>
      <text class="sans chip" x="343" y="137">PHP</text>
    </g>

    <g transform="translate(548 0)">
      <rect x="0" y="0" width="500" height="156" rx="22" fill="#0a1018" stroke="#213047"/>
      <text class="mono kicker" x="26" y="34">02 / BACKEND ENGINEERING</text>
      <text class="sans group" x="26" y="70">APIs, auth, and service logic</text>
      <text class="sans hint" x="26" y="98">Production-oriented application backends and clean contracts.</text>
      <rect x="26" y="114" width="92" height="34" rx="10" fill="#111827" stroke="url(#chipEdge)"/>
      <text class="sans chip" x="43" y="137">FastAPI</text>
      <rect x="130" y="114" width="118" height="34" rx="10" fill="#111827" stroke="url(#chipEdge)"/>
      <text class="sans chip" x="146" y="137">SQLAlchemy</text>
      <rect x="260" y="114" width="58" height="34" rx="10" fill="#111827" stroke="url(#chipEdge)"/>
      <text class="sans chip" x="278" y="137">JWT</text>
      <rect x="330" y="114" width="84" height="34" rx="10" fill="#111827" stroke="url(#chipEdge)"/>
      <text class="sans chip" x="350" y="137">OAuth2</text>
    </g>

    <g transform="translate(0 178)">
      <rect x="0" y="0" width="500" height="156" rx="22" fill="#0a1018" stroke="#213047"/>
      <text class="mono kicker" x="26" y="34">03 / FRONTEND</text>
      <text class="sans group" x="26" y="70">Interfaces and product surfaces</text>
      <text class="sans hint" x="26" y="98">UI implementation, dashboards, and lightweight interactive tools.</text>
      <rect x="26" y="114" width="78" height="34" rx="10" fill="#111827" stroke="url(#chipEdge)"/>
      <text class="sans chip" x="45" y="137">React</text>
      <rect x="116" y="114" width="128" height="34" rx="10" fill="#111827" stroke="url(#chipEdge)"/>
      <text class="sans chip" x="134" y="137">Tailwind CSS</text>
      <rect x="256" y="114" width="100" height="34" rx="10" fill="#111827" stroke="url(#chipEdge)"/>
      <text class="sans chip" x="275" y="137">Streamlit</text>
      <rect x="368" y="114" width="90" height="34" rx="10" fill="#111827" stroke="url(#chipEdge)"/>
      <text class="sans chip" x="386" y="137">Framer</text>
    </g>

    <g transform="translate(548 178)">
      <rect x="0" y="0" width="500" height="156" rx="22" fill="#0a1018" stroke="#213047"/>
      <text class="mono kicker" x="26" y="34">04 / DATA + AI</text>
      <text class="sans group" x="26" y="70">Analytics and intelligent workflows</text>
      <text class="sans hint" x="26" y="98">Data manipulation, charts, NLP, and retrieval-augmented flows.</text>
      <rect x="26" y="114" width="56" height="34" rx="10" fill="#111827" stroke="url(#chipEdge)"/>
      <text class="sans chip" x="45" y="137">ML</text>
      <rect x="94" y="114" width="62" height="34" rx="10" fill="#111827" stroke="url(#chipEdge)"/>
      <text class="sans chip" x="113" y="137">NLP</text>
      <rect x="168" y="114" width="82" height="34" rx="10" fill="#111827" stroke="url(#chipEdge)"/>
      <text class="sans chip" x="187" y="137">Pandas</text>
      <rect x="262" y="114" width="72" height="34" rx="10" fill="#111827" stroke="url(#chipEdge)"/>
      <text class="sans chip" x="280" y="137">Plotly</text>
      <rect x="346" y="114" width="64" height="34" rx="10" fill="#111827" stroke="url(#chipEdge)"/>
      <text class="sans chip" x="364" y="137">RAG</text>
    </g>

    <g transform="translate(0 356)">
      <rect x="0" y="0" width="500" height="156" rx="22" fill="#0a1018" stroke="#213047"/>
      <text class="mono kicker" x="26" y="34">05 / DATABASES</text>
      <text class="sans group" x="26" y="70">Relational data modeling</text>
      <text class="sans hint" x="26" y="98">Schema design, query layers, and persistence choices.</text>
      <rect x="26" y="114" width="118" height="34" rx="10" fill="#111827" stroke="url(#chipEdge)"/>
      <text class="sans chip" x="44" y="137">PostgreSQL</text>
      <rect x="156" y="114" width="78" height="34" rx="10" fill="#111827" stroke="url(#chipEdge)"/>
      <text class="sans chip" x="178" y="137">MySQL</text>
      <rect x="246" y="114" width="78" height="34" rx="10" fill="#111827" stroke="url(#chipEdge)"/>
      <text class="sans chip" x="267" y="137">SQLite</text>
    </g>

    <g transform="translate(548 356)">
      <rect x="0" y="0" width="500" height="156" rx="22" fill="#0a1018" stroke="#213047"/>
      <text class="mono kicker" x="26" y="34">06 / DEPLOYMENT</text>
      <text class="sans group" x="26" y="70">Shipping and operational tooling</text>
      <text class="sans hint" x="26" y="98">Containers, cloud deploys, version control, and release flow.</text>
      <rect x="26" y="114" width="86" height="34" rx="10" fill="#111827" stroke="url(#chipEdge)"/>
      <text class="sans chip" x="44" y="137">Docker</text>
      <rect x="124" y="114" width="118" height="34" rx="10" fill="#111827" stroke="url(#chipEdge)"/>
      <text class="sans chip" x="142" y="137">Kubernetes</text>
      <rect x="254" y="114" width="86" height="34" rx="10" fill="#111827" stroke="url(#chipEdge)"/>
      <text class="sans chip" x="272" y="137">Railway</text>
      <rect x="352" y="114" width="72" height="34" rx="10" fill="#111827" stroke="url(#chipEdge)"/>
      <text class="sans chip" x="371" y="137">Vercel</text>
    </g>
  </g>
</svg>
