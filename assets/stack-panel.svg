<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Tech Stack</title>
  <desc id="desc">Technology stack grouped by languages, backend, frontend, data and AI, and deployment.</desc>
  <defs>
    <linearGradient id="edge" x1="38" y1="36" x2="1162" y2="484" gradientUnits="userSpaceOnUse">
      <stop stop-color="#39ff14"/><stop offset="0.5" stop-color="#00d4ff"/><stop offset="1" stop-color="#b026ff"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#94f985" stroke-opacity="0.05"/>
    </pattern>
    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }
      .mono { font-family: "JetBrains Mono", "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; }
      .label { fill:#94a3b8; font-size:12px; font-weight:900; letter-spacing:2px; }
      .title { fill:#f8fafc; font-size:22px; font-weight:900; }
      .chip { fill:#e5e7eb; font-size:14px; font-weight:850; }
    </style>
  </defs>
  <rect width="1200" height="520" fill="transparent"/>
  <rect x="38" y="36" width="1124" height="448" rx="28" fill="#070b10"/>
  <rect x="39" y="37" width="1122" height="446" rx="27" stroke="url(#edge)" stroke-width="2"/>
  <rect x="38" y="36" width="1124" height="448" rx="28" fill="url(#grid)"/>

  <g transform="translate(76 74)">
    <rect x="0" y="0" width="150" height="30" rx="15" fill="#0d141d" stroke="#263449"/>
    <text class="mono label" x="20" y="20" fill="#39ff14">TECH STACK</text>
    <text class="sans" x="0" y="74" fill="#f8fafc" font-size="34" font-weight="900">Tools grouped by how I ship systems.</text>
    <text class="sans" x="0" y="108" fill="#94a3b8" font-size="18" font-weight="650">From APIs and data layers to interfaces, automation, and deployment.</text>
  </g>

  <g transform="translate(76 214)">
    <rect x="0" y="0" width="330" height="104" rx="20" fill="#0a1018" stroke="#213047"/>
    <text class="mono label" x="22" y="32">LANGUAGES</text>
    <text class="sans chip" x="22" y="66">Python / JavaScript / SQL / PHP</text>

    <rect x="370" y="0" width="330" height="104" rx="20" fill="#0a1018" stroke="#213047"/>
    <text class="mono label" x="392" y="32">BACKEND</text>
    <text class="sans chip" x="392" y="66">FastAPI / SQLAlchemy / JWT / OAuth2 / REST</text>

    <rect x="740" y="0" width="330" height="104" rx="20" fill="#0a1018" stroke="#213047"/>
    <text class="mono label" x="762" y="32">FRONTEND</text>
    <text class="sans chip" x="762" y="66">React / Tailwind CSS / Streamlit / Framer</text>

    <rect x="0" y="134" width="330" height="104" rx="20" fill="#0a1018" stroke="#213047"/>
    <text class="mono label" x="22" y="166">DATABASES</text>
    <text class="sans chip" x="22" y="200">PostgreSQL / MySQL / SQLite</text>

    <rect x="370" y="134" width="330" height="104" rx="20" fill="#0a1018" stroke="#213047"/>
    <text class="mono label" x="392" y="166">AI + ANALYTICS</text>
    <text class="sans chip" x="392" y="200">ML / NLP / Pandas / Plotly / RAG Pipelines</text>

    <rect x="740" y="134" width="330" height="104" rx="20" fill="#0a1018" stroke="#213047"/>
    <text class="mono label" x="762" y="166">DEPLOYMENT</text>
    <text class="sans chip" x="762" y="200">Docker / Kubernetes / Railway / Vercel / Git</text>
  </g>
</svg>
