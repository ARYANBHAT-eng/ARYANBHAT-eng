      <stop offset="0.55" stop-color="#39ff14" stop-opacity="0.09"/>
      <stop offset="1" stop-color="#39ff14" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-right" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1000 112) rotate(134) scale(360 300)">
