      <stop offset="25%" stop-color="#b026ff" stop-opacity="0.8"/>
      <stop offset="75%" stop-color="#b026ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#b026ff" stop-opacity="0"/>
    </linearGradient>
